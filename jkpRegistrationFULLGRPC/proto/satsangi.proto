syntax = "proto3";

package jkp.registration.v1;

// ─── Messages ───

message SatsangiCreate {
  string first_name           = 1;
  string last_name            = 2;
  string phone_number         = 3;
  optional int32 age          = 4;
  optional string date_of_birth     = 5;
  optional string pan               = 6;
  optional string gender            = 7;
  optional string special_category  = 8;
  string nationality                = 9;
  optional string govt_id_type      = 10;
  optional string govt_id_number    = 11;
  optional string id_expiry_date    = 12;
  optional string id_issuing_country = 13;
  optional string nick_name         = 14;
  bool print_on_card                = 15;
  optional string introducer        = 16;
  string country                    = 17;
  optional string address           = 18;
  optional string city              = 19;
  optional string district          = 20;
  optional string state             = 21;
  optional string pincode           = 22;
  optional string emergency_contact = 23;
  optional string ex_center_satsangi_id = 24;
  optional string introduced_by     = 25;
  bool has_room_in_ashram           = 26;
  optional string email             = 27;
  bool banned                       = 28;
  bool first_timer                  = 29;
  optional string date_of_first_visit = 30;
  optional string notes             = 31;
}

message Satsangi {
  string satsangi_id  = 1;
  string created_at   = 2;
  string first_name   = 3;
  string last_name    = 4;
  string phone_number = 5;
  optional int32 age          = 6;
  optional string date_of_birth     = 7;
  optional string pan               = 8;
  optional string gender            = 9;
  optional string special_category  = 10;
  string nationality                = 11;
  optional string govt_id_type      = 12;
  optional string govt_id_number    = 13;
  optional string id_expiry_date    = 14;
  optional string id_issuing_country = 15;
  optional string nick_name         = 16;
  bool print_on_card                = 17;
  optional string introducer        = 18;
  string country                    = 19;
  optional string address           = 20;
  optional string city              = 21;
  optional string district          = 22;
  optional string state             = 23;
  optional string pincode           = 24;
  optional string emergency_contact = 25;
  optional string ex_center_satsangi_id = 26;
  optional string introduced_by     = 27;
  bool has_room_in_ashram           = 28;
  optional string email             = 29;
  bool banned                       = 30;
  bool first_timer                  = 31;
  optional string date_of_first_visit = 32;
  optional string notes             = 33;
}

message SearchRequest {
  string query = 1;
}

message ListRequest {
  int32 limit = 1;
}

message SatsangiList {
  repeated Satsangi satsangis = 1;
}

message Empty {}

// HeathCheck Message
message HealthRequest{}
message HealthResponse{
  string status = 1;
  string timestamp = 2;
  string message = 3;
  string db_status = 4;
}

// ─── Service ───

service SatsangiService {
  rpc CreateSatsangi(SatsangiCreate) returns (Satsangi);
  rpc SearchSatsangis(SearchRequest) returns (SatsangiList);
  rpc ListSatsangis(ListRequest) returns (SatsangiList);
  rpc Health(HealthRequest) returns (HealthResponse);
}
