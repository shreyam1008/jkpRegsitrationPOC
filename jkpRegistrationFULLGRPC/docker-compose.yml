# Backend + Client (Caddy serves static + proxies API) — runs on the app server
#
# Build & start:
#   docker compose up -d --build
#
# DB lives on a separate server (see docker-compose.db.yml)
# Backend connects to DB at the IP hardcoded in docker/server/Dockerfile
#
# Architecture (3 containers):
#   registrationpoc.shreyam1008.com.np    →  client (Caddy /srv)         — React SPA
#   registrationpocapi.shreyam1008.com.np →  client (Caddy reverse_proxy) → server:8080
#   tunnel (optional)                     →  cloudflared → client:443    — internet access
#
# ── LAN / VPN (default) ──────────────────────────
#     Point both domains to the server's LAN IP (local DNS or /etc/hosts).
#     Access via https://registrationpoc.shreyam1008.com.np (self-signed cert warning).
#     Tunnel service can be stopped or removed.
#
# ── Exposing to the internet ──────────────────────
#     1. Start the tunnel service (already defined below)
#     2. In CF Zero Trust dashboard, map BOTH domains to http://client:80
#        - registrationpoc.shreyam1008.com.np    → http://client:80
#        - registrationpocapi.shreyam1008.com.np → http://client:80
#     3. That's it — CF terminates public TLS, tunnel talks plain HTTP to Caddy
#        (Caddy has explicit http:// blocks that serve without redirect)

services:
  server:
    build:
      context: .
      dockerfile: docker/server/Dockerfile
    restart: unless-stopped
    expose:
      - "8080"

  client:
    build:
      context: .
      dockerfile: docker/client/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"       # HTTP → HTTPS redirect
      - "443:443"     # HTTPS
      - "443:443/udp" # HTTP/3 (QUIC) — lower latency
    volumes:
      - ./docker/client/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data      # TLS certs persist across restarts
      - caddy_config:/config
    depends_on:
      - server
    deploy:
      resources:
        limits:
          memory: 128M

  # ── Cloudflare Tunnel (Option B — comment out if using direct IP) ──
  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token eyJhIjoiNjEyZmQ0MjlmNzRkODFhMmE5MDZhZGM5NTNhNGQ0M2EiLCJ0IjoiMjYyYjlmZTUtNjRjOS00ZDUyLTgzNjctYjc5ZDJiN2EyNWVmIiwicyI6Ik9EY3dZell5TlRNdFkyVTNPQzAwTnpBNUxXSmpaV1l0TlROaVpUaGtOV0k0TURnMSJ9
    depends_on:
      - client
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  caddy_data:
  caddy_config: