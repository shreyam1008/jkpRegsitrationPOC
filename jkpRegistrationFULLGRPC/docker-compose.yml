# Backend + Client (Caddy serves static + proxies API) — runs on the app server
#
# Build & start:
#   docker compose up -d --build
#
# DB lives on a separate server (see docker-compose.db.yml)
# Backend connects to DB at the IP hardcoded in docker/server/Dockerfile
#
# Architecture (3 containers):
#   app.yourdomain.com  →  client (Caddy file_server /srv)  — built React SPA
#   api.yourdomain.com  →  client (Caddy reverse_proxy)     →  server:8080 (grpc-web proxy → gRPC :50051)
#   tunnel              →  cloudflared (Cloudflare Tunnel)   →  client:443 (bypasses firewall, hides IP)
#
# ── Exposing to the internet (pick one) ──────────────────────
#
#   Option A — Traditional (direct IP):
#     1. Open ports 80/443 on your firewall/router
#     2. Point A records (app.yourdomain.com, api.yourdomain.com) to your public IP
#     3. Remove "tls internal" from Caddyfile → Caddy auto-fetches Let's Encrypt certs
#     4. The tunnel service is not needed — stop/remove it
#
#   Option B — Cloudflare Tunnel (zero exposed ports, IP hidden):
#     1. No firewall/port changes needed
#     2. Create a tunnel in Cloudflare Zero Trust dashboard → get a token
#     3. Set the token in the tunnel service below
#     4. In the CF dashboard, map app.yourdomain.com → https://client:443
#        and api.yourdomain.com → https://client:443
#     5. Keep "tls internal" in Caddyfile — CF terminates public TLS,
#        cloudflared trusts the internal cert to Caddy over the tunnel
#     6. Ports 80/443 on the host are optional (only needed for LAN access)

services:
  server:
    build:
      context: .
      dockerfile: docker/server/Dockerfile
    restart: unless-stopped
    expose:
      - "8080"

  client:
    build:
      context: .
      dockerfile: docker/client/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"       # HTTP → HTTPS redirect
      - "443:443"     # HTTPS
      - "443:443/udp" # HTTP/3 (QUIC) — lower latency
    volumes:
      - ./docker/client/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data      # TLS certs persist across restarts
      - caddy_config:/config
    depends_on:
      - server
    deploy:
      resources:
        limits:
          memory: 128M

  # ── Cloudflare Tunnel (Option B — comment out if using direct IP) ──
  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    depends_on:
      - client
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  caddy_data:
  caddy_config:
